services:
  tea-backend:
    # image: nikitaikonkin/tea-taste-api
    container_name: tea-backend
    build: .
    restart: unless-stopped
    # ports:
    #   - 3001:3001
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    healthcheck:
      # 127.0.0.1, not localhost: the app listens on IPv4 only and alpine
      # resolves localhost to ::1 first.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - mynetwork

networks:
  mynetwork:
    external: true

volumes:
  uploads: