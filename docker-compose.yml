services:
  tea-backend:
    # image: nikitaikonkin/tea-taste-api
    container_name: tea-backend
    build: .
    restart: unless-stopped
    # ports:
    #   - 3001:3001
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - mynetwork

networks:
  mynetwork:
    external: true